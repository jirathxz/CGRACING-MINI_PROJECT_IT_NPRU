<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CG RACING</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/5efd6bd50f.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <style>
        .auth-container {
            max-width: 400px;
            margin: 3rem auto;
            padding: 2.5rem;
            background-color: var(--bg-panel);
            border: 1px solid var(--bg-element);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-faint);
            font-size: 0.9rem;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .remember-forgot a {
            color: var(--accent);
            text-decoration: none;
        }

        .remember-forgot a:hover {
            text-decoration: underline;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
            margin-left: 5px;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .swal2-popup {
            font-family: 'Prompt', sans-serif !important;
        }
    </style>
</head>

<body>
    <div id="nav"></div>

    <main>
        <article>

            <div class="auth-container">
                <div class="auth-header">
                    <div class="web-name" style="margin-bottom: 2rem; transform: scale(1.5);">
                        <p class="main-text">CG</p>
                        <p class="sub-text">RACING</p>
                    </div>
                    <h2>ยินดีต้อนรับ</h2>
                    <p>เข้าสู่ระบบเพื่อเริ่มช้อปปิ้งกับเรา</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">อีเมล หรือ ชื่อผู้ใช้</label>
                        <input type="text" id="email" class="form-control" placeholder="กรอกอีเมลของคุณ" required>
                    </div>

                    <div class="form-group">
                        <label for="password">รหัสผ่าน</label>
                        <input type="password" id="password" class="form-control" placeholder="กรอกรหัสผ่าน" required>
                    </div>

                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox" id="remember"> จดจำฉันไว้
                        </label>
                        <a href="#">ลืมรหัสผ่าน?</a>
                    </div>

                    <button type="submit" class="btn btn-active btn-login">
                        <i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ
                    </button>
                </form>

                <div class="auth-footer">
                    ยังไม่มีบัญชีใช่ไหม? <a href="register.html">สมัครสมาชิก</a>
                </div>
            </div>
        </article>
    </main>
    <footer id="footer"></footer>
    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                const navElement = document.getElementById('nav');

                navElement.innerHTML = '';
                const fragment = document.createRange().createContextualFragment(data);
                navElement.appendChild(fragment);

                setActiveNav();
            })
            .catch(error => console.error('Error fetching nav:', error));
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                const navElement = document.getElementById('footer');

                navElement.innerHTML = '';
                const fragment = document.createRange().createContextualFragment(data);
                navElement.appendChild(fragment);

            })
            .catch(error => console.error('Error fetching footer:', error));
        function setActiveNav() {
            let currentPath = window.location.pathname.split("/").pop();
            if (currentPath === "" || currentPath === undefined) {
                currentPath = "index.html";
            }
            const navLinks = document.querySelectorAll('.site-sidebar ul li a, .bottom-nav ul li a');
            navLinks.forEach(link => {
                link.classList.remove('nav-active');
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('nav-active');
                }
            });
        }

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email === "cgracing" && password === "6744") {
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("userEmail", email);

                Swal.fire({
                    title: 'เข้าสู่ระบบสำเร็จ!',
                    text: `ยินดีต้อนรับกลับ`,
                    icon: 'success',
                    confirmButtonColor: '#e24242',
                    confirmButtonText: 'ไปหน้าแรก',
                    timer: 3000,
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = "index.html";
                });
            } else {
                Swal.fire({
                    title: 'เข้าสู่ระบบล้มเหลว!',
                    text: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง',
                    icon: 'error',
                    confirmButtonColor: '#e24242',
                    confirmButtonText: 'ตกลง'
                });
            }
        });
    </script>
</body>

</html>
