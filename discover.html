<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/5efd6bd50f.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- Fixed UI -->
    <div id="nav"></div>
    <!-- Normal UI -->
    <main>
        <article>
            <div class="path">
                <small>| ค้นหา</small>
            </div>
            <div class="filters">
                <button class="btn btn-active">ทั้งหมด</button>
                <button class="btn">กรองน้ำมันเครื่อง</button>
                <button class="btn">น้ำมันเครื่อง</button>
                <button class="btn">ดูแลรักษารถ</button>
                <button class="btn">น้ำมันเฟืองท้าย</button>
                <button class="btn">ชุดเปลี่ยนถ่ายน้ำมันเครื่อง</button>
            </div>
            <div class="product-list" id="productList">

            </div>
        </article>
        <script src="products.js"></script>
        <script>
            const productList = document.getElementById("productList")

            window.addEventListener("DOMContentLoaded", () => {

                // Test console log products
                console.log(getProducts());

                products.forEach(product => {
                    const soldCount = product.sold ? product.sold : "0";
                    const ratingScore = product.rating || "N/A";

                    const html = `
        <div class="product">
            <img src="${product.img_src}" alt="${product.name}">
            <div class="product-details">
                <div class="product-top">
                    <h4>${product.name}</h4>
                    <small style="color: var(--text-muted);">${product.category}</small>
                    <p style="color: var(--accent);"><i class="fa-solid fa-baht-sign"></i> ${product.price.toLocaleString()}</p>
                </div>
                <div class="product-bottom">
                    <span><i class="fa-solid fa-star"></i> ${ratingScore}</span>
                    <span>ขายแล้ว ${soldCount}</span>
                </div>
            </div>
        </div>
    </main>
    `;
                    productList.insertAdjacentHTML('beforeend', html);
                });
            });

            fetch('nav.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('nav').innerHTML = data;
                    setActiveNav();
                })
                .catch(error => console.error('Error loading nav:', error));

            function setActiveNav() {
                const currentPath = window.location.pathname.split("/").pop() || "index.html";
                const navLinks = document.querySelectorAll('.site-sidebar ul li a');

                navLinks.forEach(link => {
                    link.classList.remove('nav-active');
                    const linkPath = link.getAttribute('href');
                    if (currentPath === linkPath) {
                        link.classList.add('nav-active');
                    }
                });
            }
        </script>
</body>

</html>
