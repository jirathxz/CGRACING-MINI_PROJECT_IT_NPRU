<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CG RACING</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/5efd6bd50f.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="auth.js"></script>
    <style>
        .auth-container {
            max-width: 400px;
            margin: 3rem auto;
            padding: 2.5rem;
            background-color: var(--bg-panel);
            border: 1px solid var(--bg-element);
            border-radius: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-faint);
            font-size: 0.9rem;
        }

        .closed-notice {
            color: #e24242;
            font-weight: 600;
            margin-top: 10px;
            font-size: 0.95rem;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent);
            font-weight: 600;
            margin-left: 5px;
            text-decoration: none;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .form-disabled {
            opacity: 0.5;
        }

        .form-control:disabled {
            background-color: var(--bg-element);
            cursor: not-allowed;
            color: #888;
        }

        .btn-register {
            width: 100%;
            padding: 1rem;
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .btn-disabled-style {
            background-color: #555 !important;
            color: #aaa !important;
            cursor: not-allowed;
            border: none;
        }

        .swal2-popup {
            font-family: 'Prompt', sans-serif !important;
        }
    </style>
</head>

<body>
    <div id="nav"></div>

    <main>
        <article>
            <div class="auth-container">
                <div class="web-name" style="margin-bottom: 2rem; transform: scale(1.5); text-align: center;">
                    <p class="main-text">CG</p>
                    <p class="sub-text">RACING</p>
                </div>
                <div class="auth-header">
                    <h2>สร้างบัญชีใหม่</h2>
                    <p>ร่วมเป็นส่วนหนึ่งของครอบครัว CG RACING</p>
                    <p class="closed-notice"><i class="fa-solid fa-lock"></i> ปิดรับสมัครชั่วคราว (ทดสอบระบบ)</p>
                </div>

                <form id="registerForm" class="form-disabled">
                    <div class="form-group">
                        <label for="username">ชื่อผู้ใช้</label>
                        <input type="text" id="username" class="form-control" placeholder="เช่น somchai_777" disabled>
                    </div>

                    <div class="form-group">
                        <label for="email">อีเมล</label>
                        <input type="email" id="email" class="form-control" placeholder="example@mail.com" disabled>
                    </div>

                    <div class="form-group">
                        <label for="password">รหัสผ่าน</label>
                        <input type="password" id="password" class="form-control" placeholder="รหัสผ่านอย่างน้อย 6 ตัว"
                            disabled>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">ยืนยันรหัสผ่านอีกครั้ง</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="กรอกรหัสผ่านเดิม"
                            disabled>
                    </div>

                    <button type="submit" class="btn btn-disabled-style btn-register">
                        <i class="fa-solid fa-user-plus"></i> สมัครสมาชิก
                    </button>
                </form>

                <div class="auth-footer">
                    มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบที่นี่</a>
                </div>
            </div>
        </article>
    </main>
    <footer id="footer"></footer>
    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                const navElement = document.getElementById('nav');
                navElement.innerHTML = '';
                const fragment = document.createRange().createContextualFragment(data);
                navElement.appendChild(fragment);
                setActiveNav();
            })
            .catch(error => console.error(error));
        fetch('footer.html')
            .then(response => response.text())
            .then(data => {
                const navElement = document.getElementById('footer');

                navElement.innerHTML = '';
                const fragment = document.createRange().createContextualFragment(data);
                navElement.appendChild(fragment);

            })
            .catch(error => console.error('Error fetching footer:', error));
        function setActiveNav() {
            let currentPath = window.location.pathname.split("/").pop();
            if (currentPath === "" || currentPath === undefined) {
                currentPath = "index.html";
            }
            const navLinks = document.querySelectorAll('.site-sidebar ul li a, .bottom-nav ul li a');
            navLinks.forEach(link => {
                link.classList.remove('nav-active');
                if (link.getAttribute('href') === currentPath) {
                    link.classList.add('nav-active');
                }
            });
        }

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            Swal.fire({
                title: 'ปิดรับสมัครชั่วคราว!',
                text: 'ขออภัย ขณะนี้ CG RACING ยังไม่เปิดรับสมาชิกใหม่ กรุณาติดตามประกาศอีกครั้งในภายหลัง',
                icon: 'warning',
                confirmButtonColor: '#e24242',
                confirmButtonText: 'ตกลง'
            });
        });
    </script>
</body>

</html>
